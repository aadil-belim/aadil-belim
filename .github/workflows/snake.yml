name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"   # runs once a day (midnight UTC)
  workflow_dispatch: {}    # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main              # regenerates whenever you push to main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: aadil-belim
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#EDE9FE&color_dots=#161B22,#4C1D95,#6D28D9,#8B5CF6,#C4B5FD&color_background=#0D1117
            dist/github-contribution-grid-snake-dark.svg?color_snake=#EDE9FE&color_dots=#161B22,#4C1D95,#6D28D9,#8B5CF6,#C4B5FD&color_background=#0D1117

      - name: Push snake svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
